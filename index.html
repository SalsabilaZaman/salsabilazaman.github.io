<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salsabila Zaman – Portfolio</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Styles — one file per section -->
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/nav.css" />
    <link rel="stylesheet" href="css/hero.css" />
    <link rel="stylesheet" href="css/tech-scroll.css" />
    <link rel="stylesheet" href="css/about.css" />
    <link rel="stylesheet" href="css/skills.css" />
    <link rel="stylesheet" href="css/projects.css" />
    <link rel="stylesheet" href="css/achievements.css" />
    <link rel="stylesheet" href="css/education.css" />
    <link rel="stylesheet" href="css/contact.css" />
    <link rel="stylesheet" href="css/footer.css" />
  </head>
  <body>

    <!-- NAV -->
    <nav>
      <a href="#" class="nav-logo">Salsabila<span>.</span></a>
      <ul class="nav-links" id="nav-links"></ul>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <div class="hero-line"></div>
      <div id="hero-content" class="hero-content"></div>
      <div class="hero-image">
        <div class="hero-img-frame">
          <div class="hero-avatar">
            <!-- Swap this span for an <img> when you add a photo -->
            <span class="avatar-placeholder">SZ</span>
          </div>
        </div>
      </div>
    </section>

    <!-- TECH SCROLL -->
    <div class="tech-scroll">
      <div class="tech-track" id="tech-track"></div>
    </div>

    <!-- ABOUT -->
    <section class="about" id="about">
      <div class="about-grid" id="about-grid"></div>
    </section>

    <!-- SKILLS -->
    <section id="skills">
      <div id="skills-container"></div>
    </section>

    <!-- FEATURED PROJECTS -->
    <section class="projects" id="projects">
      <div id="featured-projects-container"></div>
    </section>

    <!-- OTHER PROJECTS -->
    <section class="other-projects" id="other-projects">
      <div id="other-projects-container"></div>
    </section>

    <!-- ACHIEVEMENTS -->
    <section class="achievements" id="achievements">
      <div id="achievements-container"></div>
    </section>

    <!-- EDUCATION -->
    <section class="education" id="education">
      <div id="education-container"></div>
    </section>

    <!-- CONTACT -->
    <section class="contact" id="contact">
      <div class="contact-inner" id="contact-container"></div>
    </section>

    <!-- FOOTER -->
    <footer id="site-footer"></footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
